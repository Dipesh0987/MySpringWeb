<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
</head>
<body>

<h2>Edit User</h2>

<form method="post" action="updateUser">

    <input type="hidden" name="id" th:value="${user.id}">

    Username:
    <input type="text"
           name="username"
           th:value="${user.username}">
    <br><br>

    Password:
    <input type="text"
           name="password"
           th:value="${user.password}">
    <br><br>

    <input type="submit" value="Update User">

</form>

</body>
</html>
