<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit User</title>
</head>
<body>



<div th:insert="nav.html"></div>
<h2>Edit This User</h2>

<form method="post" action="updateUser">

    <input type="hidden" name="id" th:value="${user.id}">

    Id:<input type="text" th:value="${user.getId()}" name="id" readonly>
    <br><br>
    Username:<input type="text" th:value="${user.getUsername()}" name="username">
    <br><br>
    <input type="hidden" th:value="${user.getPassword()}" name="password">
    <br><br>
    <input type="submit" value="Update User">

</form>

</body>
</html>
